# dark
## default color
setw -g status-bg colour236
setw -g status-fg colour250
## selected window
set -g window-status-current-style bg=colour24,fg=colour255
## pane colors
set -g display-panes-colour colour133
set -g display-panes-active-colour colour196

set -g status-left '#[bg=colour240,fg=colour15] #(hostname) #[bg=colour238,fg=colour15] #[bold]#S '
# https://i.stack.imgur.com/e63et.png
set -g status-right "#[bg=colour238,fg=colour15] %H:%M "

set -g message-style bg=colour124,fg=colour255

set -g window-style "fg=default,bg=default"
set -g window-active-style "fg=default,bg=default"
set -g pane-border-style "fg=default"
set -g pane-active-border-style "fg=default"

